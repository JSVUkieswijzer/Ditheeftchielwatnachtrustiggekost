<!-- Sanitair Bestelproces - gedeeld statusblad -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --porcelain:#EEF2F3; --surface:#FFFFFF; --surface-2:#F7F9FA;
    --ink:#16232A; --muted:#5C6B72; --faint:#8A979D;
    --line:#E1E7E9; --line-2:#EDF1F2;
    --teal:#0E7C86; --teal-dark:#0A5A62; --teal-soft:#E2F1F1;
    --green:#2F8F5B; --green-soft:#E4F3EA;
    --amber:#B9791A; --amber-soft:#FaefD8;
    --red:#C0483B; --red-soft:#F9E7E4;
    --indigo:#6C5CE7;
    --radius:14px; --radius-sm:9px;
    --shadow:0 1px 2px rgba(16,35,42,.04), 0 8px 24px -12px rgba(16,35,42,.14);
    --shadow-sm:0 1px 2px rgba(16,35,42,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:'Inter',system-ui,sans-serif; color:var(--ink);
    background:var(--porcelain); font-size:14.5px; line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;letter-spacing:-.01em}
  .mono{font-family:'IBM Plex Mono',monospace}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:14px}
  a{color:var(--teal);text-decoration:none}
  ::selection{background:var(--teal-soft)}
  *:focus-visible{outline:2px solid var(--teal);outline-offset:2px;border-radius:4px}

  /* ---- App frame ---- */
  #app{max-width:1160px;margin:0 auto;padding:0 20px 80px}
  .topbar{position:sticky;top:0;z-index:30;background:rgba(238,242,243,.86);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);margin:0 -20px 26px;padding:0 20px}
  .topbar-in{max-width:1160px;margin:0 auto;display:flex;align-items:center;gap:16px;height:62px}
  .brand{display:flex;align-items:center;gap:11px;font-family:'Space Grotesk';font-weight:600;font-size:15.5px}
  .brand .tiles{display:grid;grid-template-columns:repeat(2,7px);grid-template-rows:repeat(2,7px);gap:2px}
  .brand .tiles i{background:var(--teal);border-radius:1.5px;display:block}
  .brand .tiles i:nth-child(2){background:var(--teal-dark)}
  .brand .tiles i:nth-child(3){background:#6fb3b8}
  .brand small{display:block;font-family:'Inter';font-weight:450;font-size:11px;color:var(--muted);letter-spacing:0}
  .nav{display:flex;gap:2px;margin-left:8px}
  .nav button{padding:7px 13px;border-radius:8px;color:var(--muted);font-weight:500;font-size:13.5px}
  .nav button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm)}
  .nav button:hover{color:var(--ink)}
  .spacer{flex:1}
  .bell{position:relative;width:38px;height:38px;border-radius:10px;display:grid;place-items:center;color:var(--muted)}
  .bell:hover{background:var(--surface)}
  .bell .dot{position:absolute;top:7px;right:8px;min-width:16px;height:16px;padding:0 3px;border-radius:8px;background:var(--red);
    color:#fff;font-size:10px;font-weight:600;display:grid;place-items:center;font-family:'Inter'}
  .whoami{display:flex;align-items:center;gap:9px;padding:5px 7px 5px 5px;border-radius:999px;background:var(--surface);box-shadow:var(--shadow-sm)}
  .whoami:hover{box-shadow:var(--shadow)}
  .whoami .nm{font-weight:550;font-size:13px}
  .whoami .rl{font-size:11px;color:var(--muted)}
  .avatar{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:600;font-size:12px;font-family:'Space Grotesk';flex:none}

  .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:10px;font-weight:550;font-size:13.5px;
    background:var(--teal);color:#fff;box-shadow:var(--shadow-sm);transition:.12s}
  .btn:hover{background:var(--teal-dark)}
  .btn.ghost{background:var(--surface);color:var(--ink);box-shadow:inset 0 0 0 1px var(--line)}
  .btn.ghost:hover{background:var(--surface-2)}
  .btn.sm{padding:6px 11px;font-size:12.5px;border-radius:8px}
  .btn[disabled]{opacity:.45;cursor:not-allowed;box-shadow:none}
  .btn svg{width:15px;height:15px}

  /* ---- Login ---- */
  .login{min-height:78vh;display:grid;place-items:center;padding-top:40px}
  .login-card{width:100%;max-width:520px;text-align:center}
  .login h1{font-size:30px;margin:14px 0 6px}
  .login .lead{color:var(--muted);max-width:420px;margin:0 auto 30px}
  .who-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;text-align:left}
  .who{display:flex;align-items:center;gap:13px;padding:15px;border-radius:var(--radius);background:var(--surface);
    box-shadow:var(--shadow-sm);border:1px solid var(--line);transition:.14s}
  .who:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
  .who .avatar{width:42px;height:42px;font-size:16px}
  .who b{font-family:'Space Grotesk';font-weight:600;display:block}
  .who span{font-size:12.5px;color:var(--muted)}

  /* ---- Board ---- */
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
  .page-head h1{font-size:23px;margin:0 0 3px}
  .page-head p{margin:0;color:var(--muted);font-size:13.5px}
  .filters{display:flex;gap:4px;background:var(--surface);padding:4px;border-radius:11px;box-shadow:var(--shadow-sm);flex-wrap:wrap}
  .filters button{padding:7px 13px;border-radius:8px;font-size:13px;font-weight:500;color:var(--muted)}
  .filters button .cnt{margin-left:6px;font-size:11px;background:var(--line-2);padding:1px 6px;border-radius:20px;color:var(--muted)}
  .filters button.on{background:var(--ink);color:#fff}
  .filters button.on .cnt{background:rgba(255,255,255,.2);color:#fff}

  .board{display:flex;flex-direction:column;gap:11px}
  .order{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-sm);border:1px solid var(--line);
    padding:16px 18px;cursor:pointer;transition:.13s;position:relative;overflow:hidden}
  .order:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
  .order .edge{position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--line)}
  .order.done .edge{background:var(--green)}
  .order.warn .edge{background:var(--red)}
  .order-top{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .order .cust{font-family:'Space Grotesk';font-weight:600;font-size:16px}
  .order .ver{font-size:11.5px;font-weight:500;color:var(--teal);background:var(--teal-soft);padding:2px 7px;border-radius:6px}
  .order .owner{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);margin-left:auto}
  .order .owner .avatar{width:22px;height:22px;font-size:10px}
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px}
  .badge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
  .b-grey{color:#5c6b72;background:#eef1f2}.b-teal{color:var(--teal-dark);background:var(--teal-soft)}
  .b-amber{color:#8a5a12;background:var(--amber-soft)}.b-green{color:#1f6b41;background:var(--green-soft)}
  .b-indigo{color:#4b3fb0;background:#ece9fb}.b-red{color:#93362b;background:var(--red-soft)}

  /* tile progress spine (signature) */
  .spine{display:flex;gap:3px;margin-top:13px}
  .spine .seg{flex:1;height:8px;border-radius:2px;background:var(--line-2);position:relative;transition:.2s}
  .spine .seg.done{background:var(--teal)}
  .spine .seg.cur{background:var(--teal);box-shadow:0 0 0 2px var(--teal-soft)}
  .spine .seg.warn{background:var(--red)}
  .spine-labels{display:flex;justify-content:space-between;margin-top:6px;font-size:10.5px;color:var(--faint)}
  .flag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--red);margin-top:9px}
  .flag svg{width:13px;height:13px}

  .empty{text-align:center;padding:70px 20px;background:var(--surface);border-radius:var(--radius);border:1px dashed var(--line)}
  .empty svg{width:34px;height:34px;color:var(--faint);margin-bottom:8px}
  .empty h3{margin:0 0 5px;font-size:18px}.empty p{color:var(--muted);margin:0 0 18px}

  /* ---- Detail ---- */
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-weight:500;font-size:13.5px;margin-bottom:14px}
  .back:hover{color:var(--ink)}
  .detail-head{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-sm);border:1px solid var(--line);padding:20px 22px;margin-bottom:16px}
  .detail-head h1{font-size:24px;margin:0 0 4px;display:flex;align-items:center;gap:11px;flex-wrap:wrap}
  .meta-row{display:flex;gap:18px;flex-wrap:wrap;margin-top:12px;font-size:13px;color:var(--muted)}
  .meta-row b{color:var(--ink);font-weight:550}
  .grid2{display:grid;grid-template-columns:1fr 340px;gap:16px;align-items:start}
  @media(max-width:820px){.grid2{grid-template-columns:1fr}}

  .step{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-sm);border:1px solid var(--line);
    margin-bottom:12px;overflow:hidden}
  .step-h{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line-2)}
  .step-n{width:28px;height:28px;border-radius:8px;background:var(--surface-2);display:grid;place-items:center;
    font-family:'Space Grotesk';font-weight:600;font-size:13px;color:var(--muted);flex:none;border:1px solid var(--line)}
  .step.ok .step-n{background:var(--green);color:#fff;border-color:var(--green)}
  .step.active .step-n{background:var(--teal);color:#fff;border-color:var(--teal)}
  .step-h .t{font-family:'Space Grotesk';font-weight:600;font-size:15px}
  .step-h .sub{font-size:12px;color:var(--muted);margin-top:1px}
  .step-h .who-tag{margin-left:auto;font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px;text-align:right}
  .step-body{padding:15px 18px}
  .step.locked .step-body{opacity:.55}
  .field{margin-bottom:14px}.field:last-child{margin-bottom:0}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.03em}
  select,input[type=text],textarea{width:100%;padding:9px 11px;border-radius:9px;border:1px solid var(--line);background:var(--surface-2);color:var(--ink)}
  select:focus,input:focus,textarea:focus{background:var(--surface);border-color:var(--teal)}
  textarea{resize:vertical;min-height:60px;line-height:1.5}
  .seg-choice{display:flex;gap:6px;flex-wrap:wrap}
  .seg-choice button{padding:8px 13px;border-radius:9px;border:1px solid var(--line);background:var(--surface-2);
    font-size:13px;font-weight:500;color:var(--muted)}
  .seg-choice button.on{color:#fff}
  .seg-choice button.on[data-tone=green]{background:var(--green);border-color:var(--green)}
  .seg-choice button.on[data-tone=amber]{background:var(--amber);border-color:var(--amber)}
  .seg-choice button.on[data-tone=red]{background:var(--red);border-color:var(--red)}
  .seg-choice button.on[data-tone=teal]{background:var(--teal);border-color:var(--teal)}
  .seg-choice button:not(.on):hover{border-color:var(--faint)}
  .lockmsg{font-size:12.5px;color:var(--faint);display:flex;align-items:center;gap:6px}
  .lockmsg svg{width:13px;height:13px}
  .checklist{display:grid;gap:8px}
  .checklist label{display:flex;align-items:center;gap:10px;text-transform:none;letter-spacing:0;font-weight:450;font-size:13.5px;color:var(--ink);margin:0;cursor:pointer}
  .checklist input{width:17px;height:17px;accent-color:var(--teal);cursor:pointer}
  .foureyes{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:520px){.foureyes{grid-template-columns:1fr}}
  .eye{border:1px solid var(--line);border-radius:11px;padding:13px;background:var(--surface-2)}
  .eye.signed{background:var(--green-soft);border-color:#bfe3cd}
  .eye .role{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;color:var(--muted)}
  .eye .person{font-family:'Space Grotesk';font-weight:600;margin:2px 0 3px}
  .eye .task{font-size:12px;color:var(--muted);margin-bottom:10px;min-height:32px}
  .eye .sig{font-size:12.5px;color:var(--green);font-weight:600;display:flex;align-items:center;gap:6px}
  .eye .sig svg{width:14px;height:14px}

  /* side panel */
  .side{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-sm);border:1px solid var(--line);padding:16px 18px;margin-bottom:14px}
  .side h3{font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:0 0 12px}
  .log{display:flex;flex-direction:column;gap:12px;max-height:340px;overflow:auto}
  .log .entry{display:flex;gap:10px;font-size:13px}
  .log .entry .av{width:24px;height:24px;font-size:10px;flex:none}
  .log .entry .txt b{font-weight:600}
  .log .entry .when{font-size:11px;color:var(--faint);margin-top:1px}
  .log .empty-log{font-size:13px;color:var(--faint)}

  /* notifications panel */
  .notif-panel{position:fixed;top:64px;right:max(20px,calc((100vw - 1160px)/2 + 20px));width:340px;max-width:calc(100vw - 32px);
    background:var(--surface);border-radius:var(--radius);box-shadow:0 12px 40px -8px rgba(16,35,42,.28);border:1px solid var(--line);
    z-index:40;overflow:hidden}
  .notif-panel .nh{padding:13px 16px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;justify-content:space-between}
  .notif-panel .nh b{font-family:'Space Grotesk';font-size:14px}
  .notif-list{max-height:400px;overflow:auto}
  .nitem{display:flex;gap:11px;padding:12px 16px;border-bottom:1px solid var(--line-2);cursor:pointer}
  .nitem:hover{background:var(--surface-2)}.nitem:last-child{border-bottom:none}
  .nitem.unread{background:var(--teal-soft)}.nitem.unread:hover{background:#d5eaea}
  .nitem .tag{font-size:10.5px;font-weight:600;padding:2px 6px;border-radius:5px;background:var(--line-2);color:var(--muted);height:fit-content;white-space:nowrap}
  .nitem .body{font-size:13px}.nitem .body .when{font-size:11px;color:var(--faint);margin-top:2px}
  .notif-empty{padding:34px 16px;text-align:center;color:var(--faint);font-size:13px}

  /* modal */
  .scrim{position:fixed;inset:0;background:rgba(16,35,42,.35);backdrop-filter:blur(2px);z-index:50;display:grid;place-items:center;padding:20px}
  .modal{background:var(--surface);border-radius:16px;box-shadow:0 24px 60px -12px rgba(16,35,42,.4);width:100%;max-width:460px;padding:24px}
  .modal h2{font-size:20px;margin:0 0 4px}.modal .sub{color:var(--muted);font-size:13.5px;margin:0 0 20px}
  .modal .row{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}
  .banner{background:var(--amber-soft);color:#7a4e0e;border-radius:10px;padding:9px 13px;font-size:12.5px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
  .banner svg{width:15px;height:15px;flex:none}

  /* proces page */
  .proc{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-sm);border:1px solid var(--line);padding:26px 28px;max-width:820px}
  .proc h1{font-size:24px;margin:0 0 4px}.proc .lead{color:var(--muted);margin:0 0 24px}
  .proc h2{font-size:15px;text-transform:uppercase;letter-spacing:.04em;color:var(--teal-dark);margin:26px 0 12px}
  .rtable{width:100%;border-collapse:collapse;font-size:13.5px}
  .rtable td{padding:10px 12px;border-bottom:1px solid var(--line-2);vertical-align:top}
  .rtable tr td:first-child{width:120px}
  .proc ol{padding-left:0;list-style:none;counter-reset:s;margin:0}
  .proc ol li{counter-increment:s;position:relative;padding:12px 0 12px 44px;border-bottom:1px solid var(--line-2)}
  .proc ol li::before{content:counter(s);position:absolute;left:0;top:11px;width:28px;height:28px;border-radius:8px;
    background:var(--teal-soft);color:var(--teal-dark);font-family:'Space Grotesk';font-weight:600;display:grid;place-items:center;font-size:13px}
  .proc ol li b{font-family:'Space Grotesk'}
  .proc ol li .own{font-size:12px;color:var(--muted);margin-top:3px}
  .gold{background:var(--teal-soft);border-radius:11px;padding:14px 16px;font-size:13.5px;margin-top:20px}
  .gold b{color:var(--teal-dark)}
  @media(max-width:560px){
    .nav{display:none}.who-grid{grid-template-columns:1fr}.order .owner{margin-left:0;width:100%}
    .whoami .nm,.whoami .rl{display:none}.whoami{padding:5px}
  }
</style>

<div id="app"></div>

<script>
/* ============ Config ============ */
const PEOPLE = {
  chiel:{key:'chiel',naam:'Chiel',rol:'admin',   rolLabel:'Overhead / Admin', tag:'@admin',   ini:'CB', kleur:'#6C5CE7'},
  max:  {key:'max',  naam:'Max',  rol:'webshop', rolLabel:'Webshop',          tag:'@webshop', ini:'MW', kleur:'#0E7C86'},
  lucas:{key:'lucas',naam:'Lucas',rol:'sales',   rolLabel:'Sales',            tag:'@sales',   ini:'LV', kleur:'#B5642B'},
  ali:  {key:'ali',  naam:'Ali',  rol:'sales',   rolLabel:'Sales',            tag:'@sales',   ini:'AK', kleur:'#3A6EA5'},
};
const SALES = ['ali','lucas'];
const CHECKLIST_ITEMS = ['Toilet','Kranen','Douchegoot','Accessoires (zeepdispenser, handdoekrek e.d.)','Afmetingen tegels'];
const FASES = ['Aangeleverd','In controle','Bij klant','Klaar om te bestellen','Besteld','Geleverd & gecontroleerd'];
const FASE_BADGE = {'Aangeleverd':'b-grey','In controle':'b-teal','Bij klant':'b-amber','Klaar om te bestellen':'b-indigo','Besteld':'b-teal','Geleverd & gecontroleerd':'b-green'};
const STORE_ORDERS='sanitair_orders_v1', STORE_NOTIF='sanitair_notif_v1', STORE_ME='sanitair_me_v1';

/* ============ State ============ */
let S = { me:null, orders:[], notif:[], view:'board', current:null, filter:'lopend', showNotif:false, modal:null, persist:true };

/* ============ Storage layer (shared for team data, personal for identity) ============ */
const hasStore = typeof window!=='undefined' && window.storage && typeof window.storage.get==='function';
async function sGet(key, shared){ if(!hasStore) return null; try{ return await window.storage.get(key,shared);}catch(e){ return null; } }
async function sSet(key,val,shared){ if(!hasStore){ S.persist=false; return; } try{ await window.storage.set(key,val,shared);}catch(e){ S.persist=false; } }

async function loadAll(){
  if(!hasStore){ S.persist=false; return; }
  const o = await sGet(STORE_ORDERS,true); if(o&&o.value){ try{S.orders=JSON.parse(o.value);}catch(e){} }
  const n = await sGet(STORE_NOTIF,true);  if(n&&n.value){ try{S.notif=JSON.parse(n.value);}catch(e){} }
  const m = await sGet(STORE_ME,false);    if(m&&m.value){ S.me=m.value; }
}
async function saveOrders(){ await sSet(STORE_ORDERS, JSON.stringify(S.orders), true); }
async function saveNotif(){  await sSet(STORE_NOTIF,  JSON.stringify(S.notif),  true); }
async function saveMe(){     await sSet(STORE_ME, S.me, false); }

/* ============ Helpers ============ */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function todayNL(){ const d=new Date(); return String(d.getDate()).padStart(2,'0')+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function nowISO(){ return new Date().toISOString(); }
function fmtWhen(iso){
  const d=new Date(iso), now=new Date(), diff=(now-d)/1000;
  if(diff<60) return 'zojuist';
  if(diff<3600) return Math.floor(diff/60)+' min geleden';
  if(diff<86400) return Math.floor(diff/3600)+' uur geleden';
  const days=Math.floor(diff/86400);
  if(days<7) return days+' dag'+(days>1?'en':'')+' geleden';
  return String(d.getDate()).padStart(2,'0')+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+d.getFullYear();
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function avatar(pKey,cls){ const p=PEOPLE[pKey]; if(!p) return ''; return `<span class="avatar ${cls||''}" style="background:${p.kleur}">${p.ini}</span>`; }
function daysBetween(iso){ return Math.floor((Date.now()-new Date(iso).getTime())/86400000); }

/* Derive current phase from step statuses (Automatisch / Chiel in het document) */
function computeFase(o){
  if(o.geleverd==='Ja') return 'Geleverd & gecontroleerd';
  if(o.besteld==='Ja') return 'Besteld';
  if(o.vierChiel && o.vierMax && o.offerte==='Ja' && o.bevestiging==='Ja') return 'Klaar om te bestellen';
  if(o.stap3 && o.stap3!=='Nog niet') return 'Bij klant';
  if(o.stap2 && o.stap2!=='Nog niet') return 'In controle';
  return 'Aangeleverd';
}
function progressIndex(o){ return FASES.indexOf(computeFase(o)); }

/* Overdue flags based on termijnen in the document */
function overdue(o){
  const f=[];
  if(o.geleverd!=='Ja'){
    if((o.stap2==='Nog niet'||!o.stap2) && daysBetween(o.createdAt)>=1) f.push('Stap 2 (webshop-controle) staat langer dan 1 werkdag open');
    if(o.stap2==='Akkoord' && (o.stap3==='Nog niet'||!o.stap3) && daysBetween(o.stap2At||o.createdAt)>=2) f.push('Stap 3 (klantcheck) staat langer dan 2 werkdagen open');
  }
  return f;
}

/* Permissions per the roles table */
function isAdmin(){ return S.me==='chiel'; }
function isWebshop(){ return S.me==='max'; }
function isSales(){ return SALES.includes(S.me); }
function canDo(area,o){
  if(isAdmin()) return true;
  switch(area){
    case 'new': return isSales();
    case 'stap2': return isWebshop();
    case 'stap3': return isSales() && (!o || o.sales===S.me);
    case 'stap4': return isWebshop();
    case 'besteld': return isWebshop();
    case 'ontvangst': return isWebshop();
    case 'eyeChiel': return false; // only chiel (admin) handled above
    case 'eyeMax': return isWebshop();
    default: return false;
  }
}

/* Activity log + notifications */
function logEntry(o,text){ o.log=o.log||[]; o.log.unshift({who:S.me,text,ts:nowISO()}); }
function notify(tag,text,orderId){ S.notif.unshift({id:uid(),tag,text,orderId,ts:nowISO(),readBy:[]}); }
function myNotifs(){
  const myTag=PEOPLE[S.me].tag;
  return S.notif.filter(n=> n.tag===myTag);
}
function unreadCount(){ return myNotifs().filter(n=>!n.readBy.includes(S.me)).length; }

/* ============ Mutations ============ */
async function createOrder(klant,sales,versie){
  const o={ id:uid(), klant, sales, versie:versie||'v1', createdAt:nowISO(),
    stap2:'Nog niet', stap2At:null, checklist:[], stap3:'Nog niet',
    offerte:'Nee', bevestiging:'Nee',
    vierChiel:null, vierMax:null,
    besteld:'Nee', besteldDatum:null, geleverd:'Nee', ontvangstIni:'', opmerkingen:'', log:[] };
  logEntry(o,`Order aangemaakt en aangeleverd (${versie||'v1'})`);
  S.orders.unshift(o);
  notify('@webshop',`Nieuw bestand klaar: ${klant} (${versie||'v1'}). Controleer tegen de checklist.`,o.id);
  await saveOrders(); await saveNotif();
}
function findOrder(id){ return S.orders.find(o=>o.id===id); }

async function updateStep2(o,val){
  o.stap2=val; if(val!=='Nog niet') o.stap2At=nowISO();
  logEntry(o,`Stap 2 checklist: ${val}`);
  if(val==='Ontbreekt info') notify('@sales',`${o.klant}: webshop mist info bij de checklist. Bekijk de opmerkingen.`,o.id);
  if(val==='Akkoord') notify('@sales',`${o.klant}: webshop-controle akkoord. Check bij de klant (stap 3).`,o.id);
  await saveOrders(); await saveNotif();
}
async function toggleCheck(o,item){
  o.checklist=o.checklist||[];
  const i=o.checklist.indexOf(item);
  if(i>=0) o.checklist.splice(i,1); else o.checklist.push(item);
  await saveOrders();
}
async function updateStep3(o,val){
  o.stap3=val; logEntry(o,`Stap 3 klantcheck: ${val}`);
  if(val==='Klant akkoord (mail)') notify('@webshop',`${o.klant}: klant akkoord per mail. Klaar voor bestelvoorwaarden.`,o.id);
  await saveOrders(); await saveNotif();
}
async function newVersion(o){
  const num=parseInt((o.versie||'v1').replace(/\D/g,''))||1;
  o.versie='v'+(num+1);
  o.offerte='Nee'; o.bevestiging='Nee'; o.vierChiel=null; o.vierMax=null; // opnieuw controleren
  logEntry(o,`Nieuwe versie ${o.versie} — oude versie naar Archief. Bevestiging & 4-ogen opnieuw.`);
  notify('@webshop',`${o.klant}: ${o.versie} definitief. Controleer versienummer tegen offerte opnieuw.`,o.id);
  await saveOrders(); await saveNotif();
}
async function setYesNo(o,field,val,label){
  o[field]=val; logEntry(o,`${label}: ${val}`);
  await saveOrders();
}
async function signEye(o,who){
  const stamp={ini:PEOPLE[who].ini,date:todayNL(),ts:nowISO()};
  if(who==='chiel') o.vierChiel=stamp; else o.vierMax=stamp;
  logEntry(o,`4-ogen-check ondertekend door ${PEOPLE[who].naam} (${PEOPLE[who].ini})`);
  if(o.vierChiel && o.vierMax) notify('@webshop',`${o.klant}: 4-ogen-check compleet (${o.vierChiel.ini}/${o.vierMax.ini}). Mag besteld worden.`,o.id);
  await saveOrders(); await saveNotif();
}
async function setBesteld(o,val){
  o.besteld=val; o.besteldDatum= val==='Ja'?todayNL():null;
  logEntry(o,`Besteld: ${val}${val==='Ja'?' ('+o.besteldDatum+')':''}`);
  if(val==='Ja') notify('@admin',`${o.klant}: bestelling geplaatst op ${o.besteldDatum}.`,o.id);
  await saveOrders(); await saveNotif();
}
async function setGeleverd(o,val){
  o.geleverd=val;
  if(val==='Ja'){ o.ontvangstIni=o.ontvangstIni||`${PEOPLE[S.me].ini} ${todayNL()}`; logEntry(o,`Geleverd & gecontroleerd — compleet en onbeschadigd (${o.ontvangstIni})`); }
  else logEntry(o,`Ontvangstcontrole: nog niet afgerond`);
  await saveOrders();
}
async function reportDelivery(o){
  notify('@webshop',`${o.klant}: probleem bij levering gemeld door ${PEOPLE[S.me].naam}. Voeg foto toe in de opmerkingen.`,o.id);
  logEntry(o,`Probleem bij levering gemeld`);
  await saveOrders(); await saveNotif();
}
async function saveText(o,field,val,label){
  const changed=o[field]!==val; o[field]=val;
  if(changed && label) logEntry(o,`${label} bijgewerkt`);
  await saveOrders();
}
async function markNotifsRead(){
  const myTag=PEOPLE[S.me].tag; let ch=false;
  S.notif.forEach(n=>{ if(n.tag===myTag && !n.readBy.includes(S.me)){ n.readBy.push(S.me); ch=true; } });
  if(ch) await saveNotif();
}

function render(){
  const app=$('app');

/* ---- Board ---- */
function orderMatchesFilter(o){
  const done=computeFase(o)==='Geleverd & gecontroleerd';
  if(S.filter==='lopend') return !done;
  if(S.filter==='afgerond') return done;
  if(S.filter==='mij') return o.sales===S.me || (S.me==='max') || (S.me==='chiel'); // ownership: sales own; max/chiel are on every order
  return true;
}
function countFilter(f){
  return S.orders.filter(o=>{
    const done=computeFase(o)==='Geleverd & gecontroleerd';
    if(f==='lopend')return !done; if(f==='afgerond')return done;
    if(f==='mij')return o.sales===S.me||S.me==='max'||S.me==='chiel'; return true;
  }).length;
}
function viewBoard(){
  const list=S.orders.filter(orderMatchesFilter);
  const filters=[['lopend','Lopend'],['afgerond','Afgerond'],['mij','Mijn orders'],['alle','Alle']]
    .map(([k,l])=>`<button data-filter="${k}" class="${S.filter===k?'on':''}">${l}<span class="cnt">${countFilter(k)}</span></button>`).join('');
  const canNew=isSales()||isAdmin();
  let rows;
  if(list.length===0){
    rows=`<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></svg>
      <h3>Nog geen orders in deze weergave</h3>
      <p>${canNew?'Begin met een order, of laad een voorbeeld om het proces te bekijken.':'Sales levert de eerste order aan.'}</p>
      ${canNew?`<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <button class="btn" data-act="neworder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Nieuwe order</button>
        <button class="btn ghost" data-act="demo">Voorbeeldorder laden</button></div>`:''}
    </div>`;
  } else {
    rows=`<div class="board">${list.map(orderCard).join('')}</div>`;
  }
  return `<div class="page-head">
      <div><h1 class="display">Statusblad</h1><p>Eén regel per order. Het nieuwste Excel is leidend; een order is pas klaar als 'Geleverd & gecontroleerd' af is.</p></div>
      ${canNew?`<button class="btn" data-act="neworder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Nieuwe order</button>`:''}
    </div>
    <div style="margin-bottom:16px"><div class="filters">${filters}</div></div>
    ${rows}`;
}
function orderCard(o){
  const fase=computeFase(o), pi=progressIndex(o), flags=overdue(o);
  const done=fase==='Geleverd & gecontroleerd';
  const segs=FASES.slice(1).map((_,i)=>{ // 5 gaps between 6 phases -> use 6 tiles for 6 phases
    return '';
  });
  // 6 tiles, one per phase
  const tiles=FASES.map((f,i)=>{
    let cls='seg';
    if(i<pi) cls+=' done'; else if(i===pi) cls+=' cur';
    if(flags.length && i===pi && !done) cls='seg warn';
    return `<span class="${cls}" title="${esc(f)}"></span>`;
  }).join('');
  return `<div class="order ${done?'done':''} ${flags.length&&!done?'warn':''}" data-open="${o.id}">
    <div class="edge"></div>
    <div class="order-top">
      <span class="cust">${esc(o.klant)}</span>
      <span class="ver mono">${esc(o.versie)}</span>
      <span class="badge ${FASE_BADGE[fase]}">${fase}</span>
      <span class="owner">${avatar(o.sales)} ${PEOPLE[o.sales].naam}</span>
    </div>
    <div class="spine">${tiles}</div>
    <div class="spine-labels"><span>Aangeleverd</span><span>Klaar om te bestellen</span><span>Geleverd</span></div>
    ${flags.length&&!done?`<div class="flag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4m0 4h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>${esc(flags[0])}</div>`:''}
  </div>`;
}

/* ---- Detail ---- */
function segChoice(area,o,field,options){
  const allowed=canDo(area,o);
  const btns=options.map(([val,tone])=>{
    const on=o[field]===val;
    return `<button data-choice="${field}" data-val="${esc(val)}" data-area="${area}" data-tone="${tone}" class="${on?'on':''}" ${allowed?'':'disabled style="opacity:.55;cursor:not-allowed"'}>${esc(val)}</button>`;
  }).join('');
  return `<div class="seg-choice">${btns}</div>`;
}
function lockNote(who){ return `<div class="lockmsg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Alleen ${who} kan dit bijwerken.</div>`; }

function stepHead(n,title,sub,owner,state){
  return `<div class="step-h">
    <div class="step-n">${n}</div>
    <div><div class="t">${title}</div>${sub?`<div class="sub">${sub}</div>`:''}</div>
    <div class="who-tag">${owner}</div>
  </div>`;
}
function whoTag(keys,extra){
  const av=keys.map(k=>avatar(k)).join('');
  return `<span style="display:inline-flex;gap:3px">${av}</span><span>${extra||keys.map(k=>PEOPLE[k].naam).join(' + ')}</span>`;
}

    </div>`;

  const steps=`
    <!-- Stap 2 -->
    <div class="step ${s2done?'ok':(o.stap2==='Ontbreekt info'?'active':'')} ${canDo('stap2',o)?'':'locked'}">
      ${stepHead(2,'Webshop controleert','Binnen 1 werkdag · check tegen checklist per badkamertype',whoTag(['max']))}

          ${segChoice('stap2',o,'stap2',[['Nog niet','amber'],['Akkoord','green'],['Ontbreekt info','red']])}

      </div>
    </div>

    <!-- Bestellen -->
    <div class="step ${o.besteld==='Ja'?'ok':''} ${canDo('besteld',o)?'':'locked'}">
      ${stepHead('→','Bestelling plaatsen','Pas ná 4-ogen-check en klantakkoord',whoTag(['max']))}
      <div class="step-body">
        ${(!s5done)?`<div class="lockmsg" style="margin-bottom:10px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>4-ogen-check moet compleet zijn voordat je bestelt.</div>`:''}
        <div class="field" style="margin-bottom:${canDo('besteld',o)?'0':'8px'}"><label>Besteld${o.besteldDatum?' · '+o.besteldDatum:''}</label>
          <div class="seg-choice">
            <button data-act="besteld-nee" class="${o.besteld==='Nee'?'on':''}" data-tone="red" ${canDo('besteld',o)?'':'disabled'}>Nee</button>
            <button data-act="besteld-ja" class="${o.besteld==='Ja'?'on':''}" data-tone="green" ${(canDo('besteld',o)&&s5done)?'':'disabled'}>Ja</button>
          </div></div>
        ${canDo('besteld',o)?'':lockNote('Max')}
      </div>
    </div>

    <!-- Stap 7 -->
    <div class="step ${s7done?'ok':''} ${canDo('ontvangst',o)?'':'locked'}">
      ${stepHead(7,'Ontvangstcontrole','Mail klant 24u vóór levering · check tegen definitieve Excel',whoTag(['max','chiel'],'Max · Chiel back-up'))}
      <div class="step-body">
        <div class="field"><label>Geleverd & gecontroleerd — compleet en onbeschadigd</label>
          <div class="seg-choice">
            <button data-act="gel-nee" class="${o.geleverd==='Nee'?'on':''}" data-tone="red" ${canDo('ontvangst',o)?'':'disabled'}>Nog niet</button>
            <button data-act="gel-ja" class="${o.geleverd==='Ja'?'on':''}" data-tone="green" ${(canDo('ontvangst',o)&&o.besteld==='Ja')?'':'disabled'}>Ja, compleet</button>
          </div>
        </div>
        <div class="field"><label>Ontvangst — initialen + datum</label>
          <input type="text" data-text="ontvangstIni" value="${esc(o.ontvangstIni)}" placeholder="bijv. MW 09-07" ${canDo('ontvangst',o)?'':'disabled'}></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${canDo('ontvangst',o)?`<button class="btn ghost sm" data-act="reportdelivery">Probleem bij levering melden (@webshop)</button>`:lockNote('Max (of Chiel als back-up)')}
        </div>
        <div style="font-size:12px;color:var(--faint);margin-top:10px">Een order is pas écht klaar als dit vakje af is.</div>
      </div>
    </div>`;

  return `<button class="back" data-nav="board"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>Terug naar statusblad</button>
    <div class="detail-head">
      <h1 class="display">${esc(o.klant)} <span class="ver mono" style="font-size:14px;padding:4px 10px">${esc(o.versie)}</span>
        <span class="badge ${FASE_BADGE[fase]}">${fase}</span></h1>
      <div class="meta-row">
        <span>Ordereigenaar: <b>${PEOPLE[o.sales].naam}</b></span>
        <span>Aangeleverd: <b>${fmtWhen(o.createdAt)}</b></span>
        ${o.besteldDatum?`<span>Besteld: <b>${o.besteldDatum}</b></span>`:''}
      </div>
      ${flags.length&&!done?flags.map(f=>`<div class="flag" style="margin-top:10px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4m0 4h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>${esc(f)}</div>`).join(''):''}
    </div>
    <div class="grid2"><div>${steps}</div><div>${side}</div></div>`;
}

/* ============ Event binding ============ */
function bind(){
  const app=$('app');
  app.onclick=async (e)=>{
    const t=e.target.closest('[data-login],[data-nav],[data-open],[data-filter],[data-act],[data-choice],[data-opennotif],[data-check],[data-stop]');
    if(!t){ return; }

    if(t.dataset.stop!==undefined){ e.stopPropagation(); return; }
    if(t.dataset.login){ S.me=t.dataset.login; await saveMe(); S.view='board'; render(); return; }
    if(t.dataset.nav){ S.view=t.dataset.nav; S.showNotif=false; render(); return; }
    if(t.dataset.open){ S.current=t.dataset.open; S.view='detail'; S.showNotif=false; render(); return; }
    if(t.dataset.filter){ S.filter=t.dataset.filter; render(); return; }
    if(t.dataset.opennotif){ S.current=t.dataset.opennotif; S.view='detail'; S.showNotif=false; render(); return; }

    if(t.dataset.choice){
      const o=findOrder(S.current); if(!o) return;
      const field=t.dataset.choice, val=t.dataset.val, area=t.dataset.area;
      if(!canDo(area,o)) return;
      if(field==='stap2') await updateStep2(o,val);
      else if(field==='stap3') await updateStep3(o,val);
      else if(field==='offerte') await setYesNo(o,'offerte',val,'Offerte getekend');
      else if(field==='bevestiging') await setYesNo(o,'bevestiging',val,'Bevestiging op laatste versie');
      render(); return;
    }
    if(t.dataset.check!==undefined){
      const o=findOrder(S.current); if(!o||!canDo('stap2',o)){ return; }
      await toggleCheck(o,t.dataset.check); // no full re-render needed for checkbox smoothness
      return;
    }

    const act=t.dataset.act; if(!act) return;
    const o=findOrder(S.current);
    switch(act){
      case 'togglenotif': S.showNotif=!S.showNotif; if(S.showNotif) await markNotifsRead(); render(); break;
      case 'closenotif': S.showNotif=false; render(); break;
      case 'logout': S.me=null; S.view='board'; S.showNotif=false; await saveMe(); render(); break;
      case 'neworder': S.modal='new'; render(); break;
      case 'closemodal': case 'closemodal-bg': S.modal=null; render(); break;
      case 'createorder':{
        const k=$('m-klant').value.trim(); const sv=$('m-sales').value; const v=$('m-versie').value.trim()||'v1';
        if(!k){ $('m-klant').focus(); $('m-klant').style.borderColor='var(--red)'; return; }
        await createOrder(k,sv,v); S.modal=null; S.filter='lopend'; render(); break;
      }
      case 'demo': await loadDemo(); render(); break;
      case 'newver': if(o&&canDo('stap3',o)){ await newVersion(o); render(); } break;
      case 'signchiel': if(o&&isAdmin()&&o.offerte==='Ja'&&o.bevestiging==='Ja'){ await signEye(o,'chiel'); render(); } break;
      case 'signmax': if(o&&(isWebshop()||isAdmin())&&o.offerte==='Ja'&&o.bevestiging==='Ja'){ await signEye(o,'max'); render(); } break;
      case 'besteld-ja': if(o&&canDo('besteld',o)&&o.vierChiel&&o.vierMax){ await setBesteld(o,'Ja'); render(); } break;
      case 'besteld-nee': if(o&&canDo('besteld',o)){ await setBesteld(o,'Nee'); render(); } break;
      case 'gel-ja': if(o&&canDo('ontvangst',o)&&o.besteld==='Ja'){ await setGeleverd(o,'Ja'); render(); } break;
      case 'gel-nee': if(o&&canDo('ontvangst',o)){ await setGeleverd(o,'Nee'); render(); } break;
      case 'reportdelivery': if(o&&canDo('ontvangst',o)){ await reportDelivery(o); render(); } break;
    }
  };
  // text fields: save on change (fires on blur -> no focus loss)
  app.onchange=async (e)=>{
    const el=e.target;
    if(el.dataset && el.dataset.text!==undefined){
      const o=findOrder(S.current); if(!o) return;
      const field=el.dataset.text;
      if(field==='opmerkingen'){ await saveText(o,'opmerkingen',el.value,'Opmerkingen'); }
      else if(field==='ontvangstIni'){ if(canDo('ontvangst',o)) await saveText(o,'ontvangstIni',el.value); }
    }
  };
}

  const b=mk({klant:'Bouwbedrijf Jansen',sales:'lucas',versie:'v1',createdAt:daysAgo(2),
    stap2:'Ontbreekt info',stap2At:daysAgo(1),checklist:['Toilet'],opmerkingen:'Afmetingen tegels ontbreken nog — teruggekoppeld aan sales.',
    log:[{who:'max',text:'Stap 2 checklist: Ontbreekt info',ts:daysAgo(1)},{who:'lucas',text:'Order aangemaakt en aangeleverd (v1)',ts:daysAgo(2)}]});
  const c=mk({klant:'Renovatie Meijer',sales:'ali',versie:'v1',createdAt:daysAgo(0.1),
    log:[{who:'ali',text:'Order aangemaakt en aangeleverd (v1)',ts:daysAgo(0.1)}]});

  notify('@sales','Bouwbedrijf Jansen: webshop mist info bij de checklist. Bekijk de opmerkingen.',b.id);
  notify('@webshop','Nieuw bestand klaar: Renovatie Meijer (v1). Controleer tegen de checklist.',c.id);
  await saveOrders(); await saveNotif();
}
